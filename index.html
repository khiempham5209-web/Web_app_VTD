<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>VTD App Prototype</title>
  <script>
    (() => {
      const query = new URLSearchParams(location.search);
      const desktopPath = /(?:^|\/)(?:desktop-web\/|desktop\.html$)/i.test(location.pathname);
      if (query.get("layout") === "desktop" || desktopPath) {
        document.documentElement.classList.add("desktop");
        document.title = "Chứng từ VTD - Desktop";
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>
  <style>
    :root {
      --bg: #eef4f8;
      --surface: #fff;
      --line: #d6e0ea;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #1769aa;
      --brand-soft: #e6f2ff;
      --ok: #087f5b;
      --ok-bg: #dff8ec;
      --warn: #9a6700;
      --warn-bg: #fff4ce;
      --err: #b42318;
      --err-bg: #ffe4e0;
      --shadow: 0 12px 28px rgba(15, 23, 42, .08);
      font-family: "Times New Roman", Times, serif;
    }
    * { box-sizing: border-box; min-width: 0; }
    html { min-height: 100%; background: var(--bg); }
    html.theme-dark {
      --bg: #0f172a;
      --surface: #162033;
      --line: #334155;
      --text: #edf4ff;
      --muted: #b6c4d8;
      --brand-soft: #17375f;
      --ok-bg: #0f3c34;
      --err-bg: #43202a;
      --shadow: 0 12px 28px rgba(0, 0, 0, .22);
    }
    body { margin: 0; min-height: 100%; background: var(--bg); color: var(--text); font-size: 16px; font-family: "Times New Roman", Times, serif; }
    body.theme-dark {
      --bg: #0f172a;
      --surface: #162033;
      --line: #334155;
      --text: #edf4ff;
      --muted: #aab8cb;
      --brand-soft: #12345a;
      --brand: #63b3ff;
      --ok-bg: #123d32;
      --warn-bg: #463916;
      --err-bg: #451b18;
      --shadow: 0 12px 28px rgba(0, 0, 0, .22);
    }
    html.theme-dark,
    body.theme-dark,
    html:has(body.theme-dark),
    body.theme-dark .app,
    body.theme-dark .main,
    body.theme-dark .content,
    body.theme-dark .top,
    body.theme-dark .side,
    body.theme-dark .mobile-tabs,
    body.theme-dark .mobile-tabs button,
    body.theme-dark .login-page { background: var(--bg) !important; color: var(--text); }
    body.theme-dark .top,
    body.theme-dark .side,
    body.theme-dark .mobile-tabs { border-color: var(--line); }
    body.font-xl { font-size: 18px; }
    body.font-md { font-size: 15px; }
    body.font-sm { font-size: 14px; }
    button, input, select, textarea { font: inherit; }
    button { border: 1px solid var(--line); background: #fff; min-height: 44px; padding: 0 14px; border-radius: 8px; font-weight: 700; color: var(--text); }
    button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
    button.success { background: #099268; border-color: #099268; color: #fff; }
    input, select, textarea { width: 100%; min-height: 46px; border: 1px solid var(--line); border-radius: 8px; padding: 10px 12px; background: #fff; color: var(--text); }
    body.theme-dark button:not(.primary):not(.success) { background: var(--surface); }
    body.theme-dark input,
    body.theme-dark select,
    body.theme-dark textarea,
    body.theme-dark .section,
    body.theme-dark .stat,
    body.theme-dark .table-wrap,
    body.theme-dark .lookup,
    body.theme-dark .config-card,
    body.theme-dark .product-row,
    body.theme-dark .login-card,
    body.theme-dark .loading-box,
    body.theme-dark .settings-menu details,
    body.theme-dark .settings-body,
    body.theme-dark .settings-root,
    body.theme-dark .sku-card,
    body.theme-dark .sku-form,
    body.theme-dark .edit-sku-row,
    body.theme-dark .edit-image-row,
    body.theme-dark .preview-item,
    body.theme-dark .form-sheet { background: var(--surface); color: var(--text); border-color: var(--line); }
    body.theme-dark th { background: #0b1220; }
    body.theme-dark td { border-bottom-color: #263244; }
    select, option { font-weight: 400; }
    label { display: grid; gap: 7px; font-weight: 700; color: #475569; }
    textarea { min-height: 96px; resize: vertical; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 260px 1fr; }
    .side { background: #fff; border-right: 1px solid var(--line); padding: 18px 12px; display: grid; align-content: start; gap: 18px; }
    .brand { display: flex; gap: 12px; align-items: center; padding: 0 4px; }
    .logo { width: 42px; height: 42px; border-radius: 10px; background: var(--brand-soft); color: var(--brand); display: grid; place-items: center; font-size: 22px; font-weight: 900; }
    .brand strong { display: block; font-size: 19px; }
    .brand span { color: var(--muted); font-size: 14px; }
    .nav { display: grid; gap: 6px; }
    .nav button { justify-content: start; text-align: left; border-color: transparent; background: transparent; display: flex; align-items: center; gap: 12px; }
    .nav button.active { background: var(--brand-soft); color: var(--brand); }
    .main { min-width: 0; }
    .top { height: 64px; background: #fff; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; padding: 0 22px; position: sticky; top: 0; z-index: 5; }
    .title-row { display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
    .top h1 { margin: 0; font-size: 22px; }
    .top .user { display: none; }
    .account-pill { display: grid; gap: 1px; text-align: right; line-height: 1.1; min-width: 0; max-width: 230px; }
    .account-pill strong { color: var(--text); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-pill small { color: var(--muted); font-size: 11px; text-transform: capitalize; }
    .top-actions { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .top-refresh { display: none; width: 34px; height: 34px; min-height: 34px; padding: 0; border: 0; border-radius: 999px; color: var(--brand); background: transparent; }
    .top-refresh svg { width: 19px; height: 19px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .top-refresh.show { display: inline-grid; place-items: center; }
    .home-refresh-note { color: var(--muted); font-size: 13px; font-weight: 700; opacity: .72; margin: -2px 0 2px; }
    .content { padding: 16px 18px 86px; display: grid; gap: 10px; }
    .section { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 12px; box-shadow: var(--shadow); }
    .section h2 { margin: 0 0 9px; font-size: 18px; }
    .grid { display: grid; gap: 12px; }
    .cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .cols-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .cols-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .search-filter-grid { display: grid; gap: 9px; }
    .search-filter-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 9px; }
    .search-filter-row label { min-width: 0; }
    .center-action { margin-top: 12px; display: flex; justify-content: center; }
    .center-action button { min-width: 120px; }
    .stats { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 9px; }
    .stat { background: #fff; border: 1px solid var(--line); border-radius: 9px; padding: 9px 8px; min-width: 0; }
    .stat span { display: block; color: var(--muted); font-weight: 700; margin-bottom: 4px; white-space: nowrap; font-size: .86em; overflow: hidden; text-overflow: ellipsis; }
    .stat strong { font-size: 24px; white-space: nowrap; }
    .table-wrap { max-width: 100%; overflow: auto; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    table { width: 100%; border-collapse: collapse; min-width: 740px; font-size: .94em; }
    th, td { padding: 8px 9px; border-bottom: 1px solid #e9eef4; text-align: left; white-space: nowrap; }
    .settings-page .table-wrap table,
    .admin-page .table-wrap table { min-width: 0; table-layout: fixed; font-size: .88em; }
    .settings-page .table-wrap th,
    .settings-page .table-wrap td,
    .admin-page .table-wrap th,
    .admin-page .table-wrap td { padding: 6px 5px; line-height: 1.15; white-space: normal; overflow-wrap: anywhere; vertical-align: middle; }
    .settings-page .table-wrap th,
    .admin-page .table-wrap th { font-size: .82em; text-align: center; }
    .settings-page .table-wrap td,
    .admin-page .table-wrap td { cursor: pointer; }
    .settings-page .table-wrap td:has(button),
    .settings-page .table-wrap td:has(a),
    .settings-page .table-wrap td:has(input),
    .admin-page .table-wrap td:has(button),
    .admin-page .table-wrap td:has(a),
    .admin-page .table-wrap td:has(input) { cursor: default; }
    .compact-table table { min-width: 0; table-layout: fixed; }
    .compact-table td { padding: 8px 9px; }
    .compact-table td:last-child { text-align: right; width: 34%; }
    th { color: #64748b; font-size: 14px; background: #f8fafc; }
    body.theme-dark th { color: var(--muted); background: #0b1220; }
    tr.row { cursor: pointer; }
    tr.row:hover { background: #f8fbff; }
    .pill { display: inline-flex; align-items: center; min-height: 28px; padding: 0 10px; border-radius: 999px; font-size: 13px; font-weight: 800; }
    .pill.ok { background: var(--ok-bg); color: var(--ok); }
    .pill.run { background: #e8f1ff; color: #155fb0; }
    .pill.err { background: var(--err-bg); color: var(--err); }
    .pill.wait { background: var(--warn-bg); color: var(--warn); }
    .form-sheet { max-width: 980px; margin: 0 auto; }
    .scan-row { display: grid; grid-template-columns: 1fr 58px; gap: 8px; align-items: end; }
    .scan-btn { min-height: 46px; font-size: 22px; padding: 0; display: grid; place-items: center; align-self: end; }
    .scan-icon { width: 24px; height: 24px; display: inline-grid; grid-template-columns: 1fr 1fr; gap: 7px; position: relative; place-self: center; }
    .scan-icon i { display: block; width: 9px; height: 9px; border-color: currentColor; border-style: solid; }
    .scan-icon i:nth-child(1) { border-width: 3px 0 0 3px; }
    .scan-icon i:nth-child(2) { border-width: 3px 3px 0 0; }
    .scan-icon i:nth-child(3) { border-width: 0 0 3px 3px; }
    .scan-icon i:nth-child(4) { border-width: 0 3px 3px 0; }
    .scan-icon::after { content: ""; position: absolute; left: 5px; right: 5px; top: 11px; height: 2px; background: currentColor; opacity: .55; }
    .file-actions { display: flex; flex-wrap: wrap; gap: 7px; align-items: center; }
    .file-actions button { min-width: 118px; min-height: 38px; padding: 0 9px; font-size: 12.5px; }
    .form-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .input-sync-badge { color: var(--muted); font-size: 10px; line-height: 1.1; font-weight: 600; opacity: .62; text-align: right; padding-top: 4px; }
    .hidden-file { position: fixed; width: 1px; height: 1px; opacity: 0; pointer-events: none; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(108px, 1fr)); gap: 10px; margin-top: 10px; }
    .preview-item { position: relative; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #fff; }
    .preview-item img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: #e2e8f0; }
    .preview-item button { position: absolute; top: 6px; right: 6px; width: 34px; min-height: 34px; padding: 0; border-radius: 999px; background: rgba(180,35,24,.94); color: #fff; border-color: transparent; }
    .preview-item small { display: block; padding: 6px 7px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lookup { border: 1px solid #b8d7ff; background: #f2f8ff; border-radius: 10px; padding: 12px; display: grid; gap: 8px; }
    .sku-card { display: grid; grid-template-columns: 64px 1fr auto; gap: 10px; align-items: center; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; font-weight: 400; }
    .sku-card.open { grid-template-columns: 64px 1fr; align-items: start; }
    .sku-card strong, .sku-meta strong { font-weight: 400; }
    .sku-meta { display: grid; grid-template-columns: 92px 1fr; gap: 4px 10px; margin-top: 8px; color: var(--text); }
    .sku-meta span { color: var(--muted); font-weight: 400; }
    .product-picker { display: grid; gap: 8px; margin-top: 10px; }
    .sku-form { display: grid; gap: 10px; margin-top: 10px; padding: 12px; border: 1px solid var(--line); border-radius: 10px; background: #fbfdff; }
    .sku-added-list { display: grid; gap: 7px; margin-top: 9px; }
    .sku-added-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center; border: 1px solid var(--line); border-radius: 8px; background: var(--surface); color: var(--text); padding: 8px 9px; }
    .sku-added-item strong { font-size: .94em; font-weight: 500; overflow-wrap: anywhere; }
    .sku-added-item span { color: var(--muted); font-size: .86em; }
    .sku-added-item button { min-height: 30px; padding: 0 8px; font-size: 12px; }
    .product-row { width: 100%; display: grid; grid-template-columns: 50px 1fr auto; gap: 10px; align-items: center; text-align: left; padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .thumb { width: 58px; height: 58px; border-radius: 8px; background: #e2e8f0; object-fit: cover; }
    .detail { display: grid; grid-template-columns: 1.2fr .8fr; gap: 14px; }
    .kv { display: grid; grid-template-columns: minmax(150px, 190px) 1fr; gap: 7px 10px; align-items: start; }
    .kv span { color: var(--muted); font-weight: 700; }
    .kv strong { font-weight: 500; }
    .image-list { display: grid; gap: 8px; }
    .image-link { display: flex; gap: 10px; align-items: center; border: 1px solid var(--line); border-radius: 8px; padding: 8px; text-decoration: none; color: var(--text); }
    .record-card { display: grid; gap: 5px; }
    .record-meta { display: flex; flex-wrap: wrap; gap: 7px 10px; color: var(--muted); font-size: 14px; }
    .record-line { overflow-wrap: anywhere; }
    .bar-list { display: grid; gap: 9px; }
    .bar-row { display: grid; grid-template-columns: minmax(92px, 1fr) 2fr 72px; gap: 10px; align-items: center; }
    .bar-track { height: 20px; background: #e8f1ff; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; background: #12b8a6; }
    .permission-grid { display: grid; grid-template-columns: 1fr 1.1fr 1.3fr auto; gap: 0; border: 1px solid var(--line); border-radius: 8px; overflow: auto; background: #fff; }
    .permission-grid > div { padding: 11px 12px; border-bottom: 1px solid #e9eef4; min-width: 170px; }
    .permission-grid .head { background: #f8fafc; color: var(--muted); font-weight: 800; }
    .checks { display: flex; flex-wrap: wrap; gap: 8px 12px; }
    .checks label { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; color: var(--text); }
    .checks input { width: auto; min-height: auto; }
    .admin-tabs { display: flex; flex-wrap: wrap; gap: 8px; }
    .admin-tabs button.active { background: var(--brand); border-color: var(--brand); color: #fff; }
    .config-list { display: grid; gap: 10px; }
    .config-card { border: 1px solid var(--line); border-radius: 8px; background: #fff; padding: 12px; display: grid; gap: 8px; }
    .config-title { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .config-title strong { font-size: 17px; }
    .user-card { padding: 10px; gap: 7px; }
    .user-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: start; }
    .user-main { min-width: 0; display: grid; gap: 3px; }
    .user-email { font-size: 15px; font-weight: 900; overflow-wrap: anywhere; }
    .user-status { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; color: var(--muted); font-size: 12px; }
    .user-actions { display: flex; gap: 5px; align-items: center; }
    .mini-icon-btn { width: 34px; min-height: 34px; padding: 0; border-radius: 8px; display: grid; place-items: center; font-size: 14px; line-height: 1; }
    .mini-icon-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .mini-icon-btn.danger { color: var(--err); border-color: #fecaca; }
    .mini-icon-btn.warn { color: #9a6700; border-color: #f6d78b; }
    .inline-actions { display: inline-flex; align-items: center; gap: 6px; }
    .user-perms { display: grid; gap: 6px; padding-top: 4px; border-top: 1px solid #edf2f7; }
    .perm-line { display: grid; grid-template-columns: 46px minmax(0, 1fr); gap: 6px; align-items: start; }
    .perm-line .muted { font-size: 12px; font-weight: 800; padding-top: 4px; }
    .user-perms .tag { min-height: 22px; padding: 0 7px; font-size: 11px; }
    .muted { color: var(--muted); }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag { display: inline-flex; min-height: 26px; align-items: center; padding: 0 9px; border-radius: 999px; background: #eef4f8; color: #334155; font-size: 13px; font-weight: 800; }
    .tag.on { background: var(--ok-bg); color: var(--ok); }
    .tag.off { background: #f1f5f9; color: #64748b; }
    .builder-toolbar { display: flex; gap: 8px; flex-wrap: wrap; align-items: end; }
    .builder-toolbar label { min-width: 180px; flex: 1; }
    .schema-table input, .schema-table select { min-height: 34px; padding: 5px 7px; font-size: 13px; }
    .schema-table td, .schema-table th { padding: 6px; }
    .search-slog-summary { display: flex; flex-wrap: nowrap; gap: 6px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 2px; }
    .search-slog-summary .tag { min-height: 28px; font-size: 13px; white-space: nowrap; flex: 0 0 auto; }
    .search-table { width: 100%; min-width: 0; table-layout: fixed; font-size: .88em; }
    .search-table td, .search-table th { vertical-align: middle; }
    .search-table td, .search-table td * { font-weight: 400 !important; }
    .search-table th, .search-table td { padding: 6px 5px; }
    .search-table th { font-size: .86em; line-height: 1.12; }
    .search-table th:nth-child(2), .search-table td:nth-child(2) { white-space: nowrap; }
    .config-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
    .settings-menu { display: grid; gap: 10px; }
    .settings-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
    .settings-title h2 { margin: 0; }
    .settings-title .menu-label { display: none; }
    .settings-menu details { border: 1px solid var(--line); border-radius: 8px; background: #fff; overflow: hidden; }
    body.theme-dark .settings-menu details { background: var(--surface); }
    .settings-root { border: 0; background: transparent; }
    .settings-root > summary { min-height: 46px; display: flex; align-items: center; gap: 10px; cursor: pointer; list-style: none; font-weight: 900; }
    .settings-root > summary::-webkit-details-marker { display: none; }
    .settings-root > summary::after { content: "›"; margin-left: auto; color: var(--muted); font-size: 20px; transform: rotate(0deg); }
    .settings-root[open] > summary::after { transform: rotate(90deg); }
    .account-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 12px; }
    .account-stats { margin-top: 10px; display: grid; gap: 0; font-size: .92em; border-top: 1px solid var(--line); }
    .account-stats .stat-line,
    .account-stats .slog-stat { display: grid; grid-template-columns: max-content max-content; justify-content: start; align-items: center; gap: 8px; border-bottom: 1px solid var(--line); padding: 5px 0; }
    .account-stats .slog-line { display: grid; gap: 0; }
    .account-stats strong { text-align: left; }
    .account-stats .tag { min-height: 22px; font-size: 11px; padding: 0 7px; }
    .settings-menu summary { min-height: 46px; display: flex; align-items: center; gap: 10px; padding: 0 12px; cursor: pointer; font-weight: 900; color: var(--text); list-style: none; }
    .settings-menu summary::-webkit-details-marker { display: none; }
    .settings-menu summary::before { content: "☰"; color: var(--muted); font-size: 15px; }
    .settings-menu details[open] summary { border-bottom: 1px solid var(--line); background: #f8fafc; }
    body.theme-dark .settings-menu details[open] summary { background: #111827; }
    .settings-menu .settings-body { padding: 12px; }
    .settings-body > .section { margin: 0; border: 0; padding: 0; box-shadow: none; background: transparent; }
    .settings-body > .section + .section { margin-top: 10px; }
    .account-info { display: grid; gap: 7px; }
    .account-info .line { display: grid; grid-template-columns: 92px minmax(0, 1fr); gap: 10px; align-items: center; }
    .account-info .label { color: var(--muted); font-weight: 800; }
    .account-info .value { color: var(--text); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .account-info .value.email { font-size: .94em; }
    .settings-action-list { display: grid; gap: 8px; }
    .settings-action-list button { justify-content: space-between; text-align: left; width: 100%; display: flex; align-items: center; }
    .settings-page { gap: 0; }
    .settings-page > .section { background: transparent; border: 0; border-radius: 0; box-shadow: none; padding: 10px 8px; }
    .settings-page > .section + .section { border-top: 1px solid var(--line); }
    .settings-page .settings-menu { gap: 0; }
    .settings-page .settings-menu details { border: 0; border-radius: 0; background: transparent; border-bottom: 1px solid var(--line); }
    .settings-page .settings-menu summary { min-height: 50px; padding: 0 0; }

    function normalizeMonth(raw){
      const text = String(raw || "").trim();
      if (!text) return "";
      let m = text.match(/^(\d{1,2})\/(\d{4})$/);
      if (m) return `${String(Number(m[1])).padStart(2, "0")}/${m[2]}`;
      m = text.match(/^T?(\d{1,2})\/(\d{2,4})$/i);
      if (m) return `${String(Number(m[1])).padStart(2, "0")}/${String(m[2]).length === 2 ? "20" + m[2] : m[2]}`;
      m = text.match(/^(\d{4})-(\d{1,2})/);
      if (m) return `${String(Number(m[2])).padStart(2, "0")}/${m[1]}`;
      return text;
    }
    function monthKeys(){
      return Object.keys(storeByMonth).map(normalizeMonth).filter(m => /^\d{2}\/\d{4}$/.test(m)).filter((m,i,a)=>a.indexOf(m)===i).sort(monthCompare);
    }
    function monthCompare(a,b){
        const [ma, ya] = a.split("/").map(Number);
        const [mb, yb] = b.split("/").map(Number);
        return ya === yb ? ma - mb : ya - yb;
    }

      return `${values.month}/${values.year}`;

    function renderStoreChart(data, type, monthClickable){

        const width = 640;
        const points = data.map((x,index) => {
          const px = data.length === 1 ? width / 2 : 22 + index * (width - 44) / (data.length - 1);
          const py = 152 - (x[1] / max * 122);
          return {x:px,y:py,label:x[0],value:x[1]};
        });
        const polygon = type === "area" && points.length ? `<polygon points="22,152 ${points.map(p=>`${p.x},${p.y}`).join(" ")} ${width-22},152" fill="var(--brand)" opacity=".16"></polygon>` : "";
        return `<div style="margin-top:10px"><svg class="chart-line" viewBox="0 0 ${width} 176" preserveAspectRatio="xMidYMid meet"><line x1="20" y1="152" x2="${width-20}" y2="152" stroke="var(--line)"></line>${polygon}<polyline fill="none" stroke="var(--brand)" stroke-width="4" vector-effect="non-scaling-stroke" points="${points.map(p=>`${p.x},${p.y}`).join(" ")}"></polyline>${points.map((p,index) => `<g${action(p.label)} style="cursor:pointer"><circle cx="${p.x}" cy="${p.y}" r="5" fill="${chartColor(index)}"></circle><text x="${p.x}" y="${Math.max(13,p.y-10)}" fill="currentColor" text-anchor="middle" font-size="11">${p.value.toLocaleString("vi-VN")}</text></g>`).join("")}</svg><div class="chart-line-labels" style="grid-template-columns:repeat(${data.length},minmax(0,1fr))">${data.map(x => `<span>${html(x[0])}</span>`).join("")}</div></div>`;
      }
      if (type === "column") {
        return `<div class="chart-columns" style="grid-template-columns:repeat(${data.length},minmax(0,1fr))">${data.map((x,index) => `<div class="chart-column"${action(x[0])}><strong>${x[1].toLocaleString("vi-VN")}</strong><i style="height:${Math.max(4,Math.round(x[1]/max*132))}px;background:${chartColor(index)}"></i><span>${html(x[0])}</span></div>`).join("")}</div>`;
      }
      if (type === "list") {
        return `<div class="chart-rank-list">${data.map((x,index) => `<div class="chart-rank-row"${action(x[0])}><i>${index+1}</i><span>${html(x[0])}</span><strong>${x[1].toLocaleString("vi-VN")}</strong></div>`).join("")}</div>`;
      }
      return `<div class="bar-list chart-grid" style="margin-top:12px">${data.map(x => `<div class="bar-row chart-item ${x[0]===storeMonth?"active":""}"${action(x[0])}><strong>${html(x[0])}</strong><div class="bar-track"><div class="bar-fill" style="width:${Math.round(x[1]/max*100)}%"></div></div><span>${x[1].toLocaleString("vi-VN")} đơn</span></div>`).join("")}</div>`;

              <button class="mini-icon-btn danger" title="Xóa tài khoản" aria-label="Xóa tài khoản" onclick="deleteConfigUser(${i})"><svg viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg></button>

    function adminBuilderPanel(){
      const cfg = dynamicConfig();

      <section class="section"><h2>1. Data source mở rộng / Tab sheet</h2>

          <label>Loại view<select id="dynViewType"><option>table</option><option>search</option><option>detail</option><option>form</option><option>dashboard</option></select></label>
          <button class="primary" onclick="dynamicAddView()">Thêm view</button>
        </div>
        <div class="config-list" style="margin-top:12px">${cfg.views.length ? cfg.views.map(dynamicViewCard).join("") : `<div class="muted">Chưa có view mở rộng.</div>`}</div>
      </section>`;

    function dynamicTableCard(table, ti){
      const cols = Array.isArray(table.columns) ? table.columns : [];
      const viewOptions = ["Text","Number","Date","Time","DateTime","Enum","Yes/No","Image","File","Email","URL","Ref"];
      return `<div class="config-card">
        <div class="config-title">
          <div><strong>${html(table.name || table.sheetName || table.id)}</strong><div class="muted">${html(table.spreadsheetId || "")} · ${html(table.sheetName || "")} · ${cols.length} cột</div></div>
          <button onclick="dynamicRemoveTable(${ti})">Xóa</button>
        </div>
        <div class="table-wrap"><table class="schema-table"><thead><tr>
          <th>Name</th><th>Type</th><th>Key?</th><th>Label?</th><th>Formula</th><th>Show?</th><th>Editable?</th><th>Require?</th><th>Initial Value</th><th>Display Name</th><th>Description</th><th>Search?</th><th>Scan?</th><th>NFC?</th><th>PII?</th>
        </tr></thead><tbody>${cols.map((c, ci) => `<tr>
          <td><input value="${html(c.name || "")}" onchange="dynamicConfig().tables[${ti}].columns[${ci}].name=this.value"></td>
          <td><select onchange="dynamicConfig().tables[${ti}].columns[${ci}].type=this.value">${viewOptions.map(x => `<option ${String(c.type || "Text")===x?"selected":""}>${x}</option>`).join("")}</select></td>
          ${["key","label","show","editable","required","search","scan","nfc","pii"].map(k => {
            const checked = c[k] !== false && ["show","editable"].includes(k) || !!c[k];
            return `<td><input type="checkbox" ${checked ? "checked" : ""} onchange="dynamicConfig().tables[${ti}].columns[${ci}].${k}=this.checked"></td>`;
          }).slice(0,2).join("")}
          <td><input value="${html(c.formula || "")}" onchange="dynamicConfig().tables[${ti}].columns[${ci}].formula=this.value"></td>
          ${["show","editable","required"].map(k => {
            const checked = c[k] !== false && ["show","editable"].includes(k) || !!c[k];
            return `<td><input type="checkbox" ${checked ? "checked" : ""} onchange="dynamicConfig().tables[${ti}].columns[${ci}].${k}=this.checked"></td>`;
          }).join("")}
          <td><input value="${html(c.initialValue || "")}" onchange="dynamicConfig().tables[${ti}].columns[${ci}].initialValue=this.value"></td>
          <td><input value="${html(c.displayName || c.name || "")}" onchange="dynamicConfig().tables[${ti}].columns[${ci}].displayName=this.value"></td>
          <td><input value="${html(c.description || "")}" onchange="dynamicConfig().tables[${ti}].columns[${ci}].description=this.value"></td>
          ${["search","scan","nfc","pii"].map(k => `<td><input type="checkbox" ${c[k] ? "checked" : ""} onchange="dynamicConfig().tables[${ti}].columns[${ci}].${k}=this.checked"></td>`).join("")}
        </tr>`).join("")}</tbody></table></div>
      </div>`;
    }
    function dynamicViewCard(v, vi){
      const cfg = dynamicConfig();
      return `<div class="config-card">
        <div class="config-title"><div><strong>${html(v.name || v.id)}</strong><div class="muted">${dynId(v.id)} · ${html(v.type || "table")} · table: ${html(v.tableId || "-")}</div></div><button onclick="dynamicRemoveView(${vi})">Xóa</button></div>
        <div class="grid cols-3">
          <label>Tên<input value="${html(v.name || "")}" onchange="dynamicConfig().views[${vi}].name=this.value; render()"></label>
          <label>Icon<input value="${html(v.icon || "▦")}" onchange="dynamicConfig().views[${vi}].icon=this.value; render()"></label>
          <label>Type<select onchange="dynamicConfig().views[${vi}].type=this.value">${["table","search","detail","form","dashboard"].map(x => `<option ${String(v.type || "table")===x?"selected":""}>${x}</option>`).join("")}</select></label>
          <label>Table<select onchange="dynamicConfig().views[${vi}].tableId=this.value">${cfg.tables.map(t => `<option value="${html(t.id)}" ${String(v.tableId)===String(t.id)?"selected":""}>${html(t.name || t.sheetName)}</option>`).join("")}</select></label>
          <label>Limit<input type="number" value="${html(v.limit || 100)}" onchange="dynamicConfig().views[${vi}].limit=Number(this.value||100)"></label>
          <label><span>Enabled</span><select onchange="dynamicConfig().views[${vi}].enabled=this.value==='true'"><option value="true" ${v.enabled!==false?"selected":""}>true</option><option value="false" ${v.enabled===false?"selected":""}>false</option></select></label>
        </div>
      </div>`;
    }
    function slugId(value){
      return String(value || "view").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "") || ("view_" + Date.now());
    }
    function dynamicSheetInputValue(){
      let value = el("dynSpreadsheetId")?.value.trim() || "";
      const md = value.match(/\((https:\/\/docs\.google\.com\/spreadsheets\/d\/[^)]+)\)/i);
      if (md) value = md[1];
      const id = value.match(/\/d\/([-\w]{25,})/);
      return id ? id[1] : value;
    }
    function dynamicApiMessage(res, fallback){
      const msg = String((res && res.message) || fallback || "");
      if (/action khong hop le|action không hợp lệ|invalid action/i.test(msg)) return "Backend Apps Script live chưa deploy bản có Dynamic Builder. Cần paste Code.gs mới và triển khai lại web app.";
      return msg;
    }
    async function dynamicListSheets(){
      const spreadsheetId = dynamicSheetInputValue();
      if (!spreadsheetId) return toast("Dán link hoặc ID Google Sheet trước.", "err");
      const res = await api("dynamicListSheets", {spreadsheetId});
      if (!res.ok) return toast(dynamicApiMessage(res, "Không đọc được danh sách tab."), "err");
      const select = el("dynSheetList");
      if (select) select.innerHTML = (res.sheets || []).map(s => `<option value="${html(s.name)}">${html(s.name)} (${s.rows || 0} dòng)</option>`).join("");
      toast("Đã đọc danh sách tab.", "ok");
    }
    async function dynamicAddTableFromSheet(){
      const spreadsheetId = dynamicSheetInputValue();
      const sheetName = el("dynSheetList")?.value;
      if (!spreadsheetId || !sheetName) return toast("Chọn đủ link sheet và tab sheet.", "err");
      const res = await api("dynamicReadColumns", {spreadsheetId, sheetName});
      if (!res.ok) return toast(dynamicApiMessage(res, "Không đọc được cột."), "err");
      const cfg = dynamicConfig();
      const id = slugId(sheetName);
      const table = {id, name: sheetName, spreadsheetId: res.spreadsheetId || spreadsheetId, sheetName: res.sheetName || sheetName, columns: res.columns || []};
      const idx = cfg.tables.findIndex(t => t.id === id);
      if (idx >= 0) cfg.tables[idx] = table; else cfg.tables.push(table);
      if (!cfg.views.some(v => v.tableId === id)) cfg.views.push({id:id + "_table", name: sheetName, icon:"▦", type:"table", tableId:id, limit:100, enabled:true});
      admin();
      toast("Đã thêm table và view mẫu.", "ok");
    }
    function dynamicAddView(){
      const cfg = dynamicConfig();
      const name = el("dynViewName")?.value.trim() || "View mới";
      const tableId = el("dynViewTable")?.value || (cfg.tables[0] && cfg.tables[0].id) || "";
      if (!tableId) return toast("Cần có table trước khi tạo view.", "err");
      cfg.views.push({id:slugId(name) + "_" + Date.now().toString(36), name, icon:"▦", type:el("dynViewType")?.value || "table", tableId, limit:100, enabled:true});
      admin();
    }
    function dynamicRemoveTable(i){ dynamicConfig().tables.splice(i, 1); admin(); }
    function dynamicRemoveView(i){ dynamicConfig().views.splice(i, 1); admin(); }
    async function dynamicSaveConfig(){
      const res = await api("saveDynamicConfig", {config: dynamicConfig()});
      if (!res.ok) return toast(res.message || "Lưu Dynamic lỗi.", "err");
      saveAppConfig(false);
      render();
      toast("Đã lưu Dynamic Builder.", "ok");
    }
    async function dynamicLoadConfig(forceRender){
      const res = await api("dynamicConfig", {_silent: !forceRender});
      if (!res.ok) return forceRender ? toast(res.message || "Không tải được dynamic config.", "err") : null;
      appConfig.dynamic = res.config || {version:1, tables:[], views:[]};
      saveAppConfig(false);
      if (forceRender) render();
      return appConfig.dynamic;
    }
    function dynamicView(){
      const id = String(view || "").replace(/^dyn_/, "");
      const cfg = dynamicConfig();
      const viewCfg = cfg.views.find(v => String(v.id) === id);
      const tableCfg = viewCfg && cfg.tables.find(t => String(t.id) === String(viewCfg.tableId));
      if (!viewCfg || !tableCfg) {
        el("view").className = "content";
        el("view").innerHTML = `<section class="section"><h2>View mở rộng</h2><div class="muted">Không thấy cấu hình view hoặc chưa được phân quyền.</div></section>`;
        return;
      }
      if (String(viewCfg.type || "").toLowerCase() === "form") return dynamicForm(viewCfg, tableCfg);
      return dynamicTableView(viewCfg, tableCfg);
    }
    function dynamicVisibleColumns(tableCfg){
      return (tableCfg.columns || []).filter(c => c.show !== false);
    }
    function dynamicTableView(viewCfg, tableCfg){
      const id = String(viewCfg.id);
      const rows = dynamicState.rows[id] || [];
      const detail = dynamicState.detail[id];
      const query = dynamicState.query[id] || "";
      const cols = dynamicVisibleColumns(tableCfg).slice(0, 6);
      el("view").className = "content";
      el("view").innerHTML = `<section class="section"><div class="config-title">
        <div><h2>${html(viewCfg.name || "View mở rộng")}</h2><div class="muted">${html(tableCfg.name || tableCfg.sheetName)} · ${html(viewCfg.type || "table")}</div></div>
        <button onclick="dynamicLoadRows('${html(id)}', true)">Tải lại</button>
      </div>
      <div class="searchbar" style="margin-top:10px"><input id="dynQuery_${html(id)}" value="${html(query)}" placeholder="Tìm trong view này"><button onclick="dynamicSearchRows('${html(id)}')">Tìm</button></div>
      ${dynamicState.loading[id] ? `<div class="muted" style="margin-top:8px">Đang tải dữ liệu...</div>` : ""}
      <div class="table-wrap" style="margin-top:10px"><table class="result-table"><thead><tr>${cols.map(c => `<th>${html(c.displayName || c.name)}</th>`).join("")}</tr></thead><tbody>
        ${rows.length ? rows.map((r, ri) => `<tr class="row" onclick="dynamicOpenDetail('${html(id)}', ${ri})">${cols.map(c => `<td>${html(r[c.name] ?? "")}</td>`).join("")}</tr>`).join("") : `<tr><td colspan="${Math.max(cols.length,1)}" class="muted">Chưa có dữ liệu.</td></tr>`}
      </tbody></table></div></section>
      ${detail ? dynamicDetailCard(viewCfg, tableCfg, detail) : ""}`;
      if (!dynamicState.loaded[id] && !dynamicState.loading[id]) dynamicLoadRows(id, false);
    }
    function dynamicDetailCard(viewCfg, tableCfg, row){
      const cols = dynamicVisibleColumns(tableCfg);
      return `<section class="section"><h2>Chi tiết</h2>${cols.map(c => {
        const value = row[c.name];
        if (value === undefined || value === null || value === "") return "";
        return `<div class="detail-row"><span>${html(c.displayName || c.name)}</span><strong>${html(value)}</strong></div>`;
      }).join("")}</section>`;
    }
    function dynamicOpenDetail(id, index){
      dynamicState.detail[id] = (dynamicState.rows[id] || [])[index] || null;
      dynamicTableView(dynamicConfig().views.find(v => String(v.id) === String(id)), dynamicConfig().tables.find(t => String(t.id) === String((dynamicConfig().views.find(v => String(v.id) === String(id)) || {}).tableId)));
    }
    function dynamicSearchRows(id){
      dynamicState.query[id] = el("dynQuery_" + id)?.value || "";
      dynamicLoadRows(id, true);
    }
    async function dynamicLoadRows(id, force){
      if (dynamicState.loading[id]) return;
      const viewCfg = dynamicConfig().views.find(v => String(v.id) === String(id));
      if (!viewCfg) return;
      dynamicState.loading[id] = true;
      if (force) dynamicState.loaded[id] = false;
      dynamicView();
      const res = await api("dynamicReadRows", {viewId:id, query:dynamicState.query[id] || "", limit:viewCfg.limit || 100, _silent:true});
      dynamicState.loading[id] = false;
      if (res.ok) {
        dynamicState.rows[id] = res.rows || [];
        dynamicState.loaded[id] = true;
      } else {
        toast(res.message || "Không tải được view mở rộng.", "err");
      }
      if (view === dynId(id)) dynamicView();
    }
    function dynamicForm(viewCfg, tableCfg){
      const cols = dynamicVisibleColumns(tableCfg).filter(c => c.editable !== false);
      el("view").className = "content";
      el("view").innerHTML = `<section class="section"><h2>${html(viewCfg.name || "Form mở rộng")}</h2><div class="grid">
        ${cols.map(c => `<label>${html(c.displayName || c.name)}${dynamicInputForColumn(viewCfg.id, c)}</label>`).join("")}
      </div><div class="config-actions" style="margin-top:12px"><button class="primary" onclick="dynamicSubmitForm('${html(viewCfg.id)}')">Lưu</button></div></section>`;
    }
    function dynamicInputForColumn(viewId, c){
      const id = `dynForm_${viewId}_${slugId(c.name)}`;
      const val = c.initialValue || "";
      if (c.type === "Yes/No") return `<select id="${html(id)}"><option>false</option><option>true</option></select>`;
      if (c.type === "Number") return `<input id="${html(id)}" type="number" value="${html(val)}">`;
      if (c.type === "Date") return `<input id="${html(id)}" type="date" value="${html(val)}">`;
      if (c.type === "Time") return `<input id="${html(id)}" type="time" value="${html(val)}">`;
      const scan = c.scan ? `<button class="scan-btn" type="button" title="Quét mã" aria-label="Quét mã" onclick="openCodeScanner('${html(id)}')">${scanIcon("Quét mã")}</button>` : "";
      return `<div class="scan-row"><input id="${html(id)}" value="${html(val)}" ${c.required ? "required" : ""}>${scan}</div>`;
    }
    async function dynamicSubmitForm(viewId){
      const viewCfg = dynamicConfig().views.find(v => String(v.id) === String(viewId));
      const tableCfg = viewCfg && dynamicConfig().tables.find(t => String(t.id) === String(viewCfg.tableId));
      if (!viewCfg || !tableCfg) return;
      const data = {};
      dynamicVisibleColumns(tableCfg).filter(c => c.editable !== false).forEach(c => data[c.name] = el(`dynForm_${viewId}_${slugId(c.name)}`)?.value || "");
      const res = await api("dynamicSaveRow", {viewId, data});
      if (!res.ok) return toast(res.message || "Lưu form mở rộng lỗi.", "err");
      toast("Đã lưu.", "ok");
    }

        <div class="grid cols-2" style="margin-bottom:12px">
          <label>Màu chủ đề toàn hệ thống<select id="adminThemeColor" onchange="appConfig.personal=appConfig.personal||{};appConfig.personal.themeColor=this.value;applyPersonalSettings()">${themeColors.map(color => `<option ${color===currentThemeColor?"selected":""}>${color}</option>`).join("")}</select></label>
        </div>

        ${(appConfig.views || []).sort((a,b)=>(a.position||0)-(b.position||0)).map((v, i) => `<div class="config-card">
          <div class="config-title"><div><strong>${html(v.name)}</strong><div class="muted">${html(v.id)} · ${html(v.type)} · vị trí ${v.position}</div></div>${v.mobile !== false ? '<span class="tag on">Tab dưới</span>' : '<span class="tag off">Trong cài đặt</span>'}</div>
          <div class="grid cols-3">
            <label>Tên màn<input value="${html(v.name || "")}" onchange="appConfig.views[${i}].name=this.value"></label>
            <label>Icon<input value="${html(v.icon || "")}" placeholder="VD: ⌂, ⇈, ☷" onchange="appConfig.views[${i}].icon=this.value"></label>
            <label>Vị trí<input type="number" value="${html(v.position || i + 1)}" onchange="appConfig.views[${i}].position=Number(this.value||${i + 1})"></label>
            <label>Hiện icon<select onchange="appConfig.views[${i}].showIcon=this.value==='true'"><option value="true" ${v.showIcon!==false?"selected":""}>Bật icon</option><option value="false" ${v.showIcon===false?"selected":""}>Tắt icon</option></select></label>
            <label>Hiển thị<select onchange="appConfig.views[${i}].mobile=this.value==='tab'"><option value="tab" ${v.mobile!==false?"selected":""}>Ngoài thanh tab</option><option value="settings" ${v.mobile===false?"selected":""}>Trong cài đặt</option></select></label>
            <label>Bật màn<select onchange="appConfig.views[${i}].enabled=this.value==='true'"><option value="true" ${v.enabled!==false?"selected":""}>Bật</option><option value="false" ${v.enabled===false?"selected":""}>Tắt</option></select></label>
            <label>Loại màn<input value="${html(v.type || "")}" onchange="appConfig.views[${i}].type=this.value"></label>
          </div>
          <div><span class="muted">Show_If:</span> <strong>${html(v.showIf || "-")}</strong></div>
        </div>`).join("")}
      </div><div class="config-actions" style="margin-top:12px"><button class="primary" onclick="saveScreenUiConfig()">Lưu cấu hình màn</button></div></section>`;
    }

    async function loadAccountStats(){
      if (live.accountStatsLoading) return;
      live.accountStatsLoading = true;
      live.accountStats = emptyAccountStats(true);
      if (view === "settings") settings();
      try {
        const email = String(currentEmail() || "").trim().toLowerCase();
        const bySlog = {};
        let total = 0;
        const add = (slog) => {
          total += 1;
          const key = String(slog || "-").trim() || "-";
          bySlog[key] = (bySlog[key] || 0) + 1;
        };
        const rows = await dataCacheGetAll("rawFull", (DATA_CACHE_TYPES.rawFull && DATA_CACHE_TYPES.rawFull.capRows || 20000) + 2000);
        rows.forEach(raw => {
          const user = String(raw.userEmail || raw.user_email || raw.User_email || raw.UserEmail || raw.email || raw.user || "").trim().toLowerCase();
          if (email && user === email) add(raw.slog || raw.Slog || raw.SLOG);
        });
        localQueue().forEach(item => {
          const payload = (item && item.payload) || {};
          const user = String(payload.userEmail || payload.user_email || payload.User_email || payload.email || currentEmail() || "").trim().toLowerCase();
          if (!email || user !== email) return;
          if (item && item.kind === "returnTh") add("TH truemilk");
          else add(payload.slog || payload.Slog || payload.SLOG || payload.slogCode);
        });
        live.accountStats = {loading:false, total, bySlog};
      } catch (err) {
        live.accountStats = {loading:false, total:0, bySlog:{}, error:String(err && err.message || err)};
      } finally {
        live.accountStatsLoaded = true;
        live.accountStatsLoading = false;
        if (view === "settings") settings();
      }
    }

    function vnDayNumber(value){
      const date = value ? new Date(value) : new Date();
      return Math.floor(new Date(date.getFullYear(), date.getMonth(), date.getDate()).getTime() / 86400000);
    }
    function passPolicyState(email){
      const key = passPolicyKey(email);
      let data = {};
      try { data = JSON.parse(localStorage.getItem(key) || "{}") || {}; } catch (err) { data = {}; }
      if (!data.changedAt && !Number(data.changeCount || 0)) {
        const suffix = "_" + String(email || "").toLowerCase().trim();
        for (let i = 0; i < localStorage.length; i++) {
          const oldKey = String(localStorage.key(i) || "");
          if (!oldKey.startsWith("vtd_pass_policy_") || !oldKey.endsWith(suffix) || oldKey === key) continue;
          try {
            const oldData = JSON.parse(localStorage.getItem(oldKey) || "{}") || {};
            if (oldData.changedAt || Number(oldData.changeCount || 0) > 0) {
              data.changedAt = oldData.changedAt || new Date().toISOString();
              data.changeCount = Number(oldData.changeCount || 1);
              break;
            }
          } catch (err) {}
        }
      }
      if (!data.firstLoginAt) {
        data.firstLoginAt = new Date().toISOString();
        data.firstLoginDay = vnDayNumber();
      }
      localStorage.setItem(key, JSON.stringify(data));
      return data;
    }
    function savePassPolicyState(email, data){
      localStorage.setItem(passPolicyKey(email), JSON.stringify(data || {}));
    }
    function passwordPolicyChanged(policy){
      policy = policy || {};
      const count = Number(policy.changeCount || policy.passChangeCount || policy.passwordChangeCount || policy.Pass_Change_Count || 0);
      const changedAt = policy.changedAt || policy.passChangedAt || policy.passwordChangedAt || policy.Pass_Changed_At || "";
      return count > 0 || !!String(changedAt || "").trim();
    }
    function evaluateFirstPassPolicy(){
      const email = currentEmail();
      if (!email) return;
      const localState = passPolicyState(email);
      if (localState.changedAt || Number(localState.changeCount || 0) > 0) return;
      const serverPolicy = live.passwordPolicy || (live.user && live.user.passwordPolicy) || null;
      if (serverPolicy) {
        if (passwordPolicyChanged(serverPolicy) || !serverPolicy.mustChange) {
          const doneState = passPolicyState(email);
          doneState.changedAt = doneState.changedAt || serverPolicy.changedAt || serverPolicy.passChangedAt || new Date().toISOString();
          doneState.changeCount = Math.max(Number(doneState.changeCount || 0), Number(serverPolicy.changeCount || serverPolicy.passChangeCount || 0));
          savePassPolicyState(email, doneState);
          return;
        }
        const daysLeft = Math.max(0, Number(serverPolicy.deadlineDays || 0));
        const force = !!serverPolicy.forceChange;
        changePass({
          required: force,
          message: force
            ? "Đã quá 3 ngày kể từ lần đăng nhập đầu tiên của phiên bản này. Vui lòng đổi Pass khác Pass mặc định để tiếp tục sử dụng."
            : "Mật khẩu mặc định chỉ dùng để đăng nhập lần đầu. Vui lòng đổi mật khẩu mới sau khi đăng nhập và không chia sẻ mật khẩu cho người khác."
        });
        return;
      }
      const state = localState;
      if (state.changedAt) return;
      const firstDay = Number(state.firstLoginDay || vnDayNumber(state.firstLoginAt));
      const ageDays = Math.max(0, vnDayNumber() - firstDay);
      if (ageDays >= 3) {
        changePass({
          required: true,
          message: "Đã quá 3 ngày kể từ lần đăng nhập đầu tiên của phiên bản này. Vui lòng đổi Pass khác Pass mặc định để tiếp tục sử dụng."
        });
      } else {
        const left = Math.max(1, 3 - ageDays);
        setTimeout(() => changePass({
          required: false,
          message: "Mật khẩu mặc định chỉ dùng để đăng nhập lần đầu. Vui lòng đổi mật khẩu mới sau khi đăng nhập và không chia sẻ mật khẩu cho người khác."
        }), 350);
      }
    }
    function validateStrongPass(pass, oldPass){
      if (String(pass || "").length < 8) return "Pass mới phải có ít nhất 8 ký tự.";
      if (oldPass && pass === oldPass) return "Pass mới phải khác Pass mặc định/Pass cũ.";
      if (!/[A-Z]/.test(pass)) return "Pass mới cần có ít nhất 1 chữ hoa.";
      if (!/[a-z]/.test(pass)) return "Pass mới cần có ít nhất 1 chữ thường.";
      if (!/[0-9]/.test(pass)) return "Pass mới cần có ít nhất 1 số.";
      return "";
    }

      hideChangePass();
    }

            await ensureQueueItemImageRefs(item);
            item.status = "syncing";
            item.attempts = Number(item.attempts || 0) + 1;
            item.lastTryAt = Date.now();
            item.lastStep = "saveReturnTh";
            saveLocalQueue(queue);
            updateInputSyncBadge();
            scheduleQueueReport();

            const filesBySku = {};
            try {
              for (const ref of (item.images || [])) {
                const payload = await queuedImagePayload(ref);
                const skuIndex = Number(payload && payload.skuIndex != null ? payload.skuIndex : 0);
                if (!filesBySku[skuIndex]) filesBySku[skuIndex] = [];
                filesBySku[skuIndex].push(payload);
              }
            } catch (err) {
              queue = localQueue();
              const updated = queue.find(x => x.localId === item.localId);
              if (updated) {
                updated.status = "error";
                updated.lastError = String(err && err.message || err);
                updated.lastStep = "readReturnThImage";
                saveLocalQueue(queue);
                updateInputSyncBadge();
                scheduleQueueReport();
              }
              continue;
            }

            const returnThItems = (Array.isArray(item.payload.items) ? item.payload.items : []).map((sku, skuIndex) => Object.assign({}, sku, {
              clientItemId: sku.clientItemId || `${item.payload.clientBatchId || item.localId}-${skuIndex + 1}`,
              images: filesBySku[skuIndex] || [],
              files: filesBySku[skuIndex] || []
            }));
            const res = await returnThApi("saveReturnTh", Object.assign({}, item.payload, {
              clientBatchId: item.payload.clientBatchId || item.localId,
              clientId: item.localId,
              items: returnThItems,
              _silent:true
            }));
            queue = localQueue();
            const updated = queue.find(x => x.localId === item.localId);
            if (!updated) continue;
            if (!res.ok) {
              updated.status = "error";
              updated.lastError = res.message || "Sync Nhập TH lỗi";
              updated.lastStep = "saveReturnTh";
              saveLocalQueue(queue);
              updateInputSyncBadge();
              scheduleQueueReport();
              continue;
            }
            await queueImagesDelete((updated.images || []).map(img => img && img.id));
            updated.status = "done";
            updated.remoteId = res.id || "";
            updated.syncedAt = Date.now();
            updated.lastError = "";
            updated.lastStep = "done";
            saveLocalQueue(queue);
            updateInputSyncBadge();
            scheduleQueueReport();
            live.returnThTodayLoaded = false;
            if (view === "home") loadReturnThToday(true);
            continue;
          }
          await ensureQueueItemImageRefs(item);
          item.status = "syncing";
          item.attempts = Number(item.attempts || 0) + 1;
          item.lastTryAt = Date.now();
          item.lastStep = "saveRaw";
          saveLocalQueue(queue);
          refreshLocalRows();
          updateInputSyncBadge();
          scheduleQueueReport();
          if (view === "home") home();

          queue = localQueue();
          const current = queue.find(x => x.localId === item.localId);
          if (!current) continue;
          let res = current.remoteId ? {ok:true, id: current.remoteId} : await apiWithHardTimeout("saveRaw", Object.assign({}, current.payload, {_silent:true}), 60000, "Lưu đơn quá 60 giây chưa phản hồi.");
          queue = localQueue();
          const updated = queue.find(x => x.localId === item.localId);
          if (!updated) continue;
          if (!res.ok) {
            updated.status = "error";
            updated.lastError = res.message || "Sync lỗi";
            updated.lastStep = "saveRaw";
            saveLocalQueue(queue);
            updateInputSyncBadge();
            scheduleQueueReport();
            continue;
          }

          updated.remoteId = res.id || "";
          updated.rawSyncedAt = Date.now();
          updated.lastError = "";
          if (updated.images && updated.images.length) {
            updated.status = "pendingImage";
            updated.lastStep = "rawDone_waitImage";
          } else {
            updated.status = "done";
            updated.syncedAt = Date.now();
            updated.lastStep = "done";
          }
          saveLocalQueue(queue);
          refreshLocalRows();
          updateInputSyncBadge();
          scheduleQueueReport();
          if (view === "home") home();
        }

        queue = localQueue();
        for (let i = 0; i < queue.length; i++) {
          const item = queue[i];
          if (!item || item.status === "done" || item.status === "syncing") continue;
          if (!item.remoteId || !item.images || !item.images.length || item.imagesUploaded) continue;
          await ensureQueueItemImageRefs(item);
          item.status = "syncing";
          item.attempts = Number(item.attempts || 0) + 1;
          item.lastTryAt = Date.now();
          item.lastStep = "uploadImages";
          saveLocalQueue(queue);
          updateInputSyncBadge();
          scheduleQueueReport();
          if (view === "home") home();

          const imgMaDon = item.payload.maDon || item.payload.ma_don || item.payload.orderCode || item.payload["Mã đơn"] || "";
          const imageIndex = Math.max(0, Number(item.imageIndex || 0));
          let imageFile = null;
          try {
            imageFile = await queuedImagePayload(item.images[imageIndex]);
          } catch (err) {
            queue = localQueue();
            const updated = queue.find(x => x.localId === item.localId);
            if (updated) {
              updated.status = "error";
              updated.imageIndex = imageIndex;
              updated.lastError = String(err && err.message || err);
              updated.lastStep = "readImage";
              saveLocalQueue(queue);
              updateInputSyncBadge();
              scheduleQueueReport();
            }
            continue;
          }
          const imgRes = await apiWithHardTimeout("uploadImage", Object.assign({}, imageFile || {}, {
            rawId: item.remoteId,
            maDon: imgMaDon,
            deferFullSync: true,
            _silent: true
          }), 45000, `Upload ảnh ${imageIndex + 1}/${item.images.length} quá 45 giây chưa phản hồi.`);
          queue = localQueue();
          const updated = queue.find(x => x.localId === item.localId);
          if (!updated) continue;
          if (!imgRes.ok) {
            updated.status = "error";
            updated.imageIndex = imageIndex;
            updated.lastError = `Ảnh ${imageIndex + 1}/${(updated.images || []).length || 0}: ${imgRes.message || "Upload ảnh lỗi"}`;
            updated.lastStep = "uploadImages";
            saveLocalQueue(queue);
            updateInputSyncBadge();
            scheduleQueueReport();
            continue;
          }
          await queueImageDelete((updated.images || [])[imageIndex] && (updated.images || [])[imageIndex].id);
          updated.imageIndex = imageIndex + 1;
          if (updated.imageIndex < (updated.images || []).length) {
            updated.status = "pendingImage";
            updated.lastStep = `uploadedImage_${updated.imageIndex}/${updated.images.length}`;
          } else {
            updated.status = "done";
            updated.imagesUploaded = true;
            updated.syncedAt = Date.now();
            updated.imageSyncedAt = Date.now();
            updated.lastStep = "done";
          }
          updated.lastError = "";
          saveLocalQueue(queue);
          refreshLocalRows();
          updateInputSyncBadge();
          scheduleQueueReport();
          if (view === "home") home();
        }
      } finally {
        live.syncRunning = false;
        live.syncStartedAt = 0;
        scheduleQueueReport();
      }
      const stats = queueStats();
      if (!stats.pending && !stats.pendingImage && !stats.syncing && !stats.error) {
        await loadDashboard({silent:true});
        live.dashboardRefreshActive = false;
        scheduleSyncQueue();
      } else {
        live.dashboardRefreshActive = !!(stats.pending || stats.pendingImage || stats.syncing);
        if (hasSyncableQueueWork()) scheduleSyncQueue(1000);
      }
    }

    function rememberStoreMonths(months){
      const normalizedMonths = (Array.isArray(months) ? months : [])
        .map(m => normalizeMonth(m && typeof m === "object" ? (m.key || m.month) : m))
        .filter(m => /^\d{2}\/\d{4}$/.test(m));
      if (!normalizedMonths.length) return [];
      let cache = {};
      try { cache = JSON.parse(localStorage.getItem(STORE_INFO_CACHE_KEY) || "{}") || {}; } catch (err) { cache = {}; }
      const known = new Set([...(Array.isArray(cache.knownMonths) ? cache.knownMonths : []), ...(live.storeInfoKnownMonths || [])].map(normalizeMonth).filter(Boolean));
      const before = known.size;
      normalizedMonths.forEach(month => known.add(month));
      const sorted = Array.from(known).sort(monthCompare);
      cache.knownMonths = sorted;
      cache.updatedAt = new Date().toISOString();
      live.storeInfoKnownMonths = sorted;
      try { localStorage.setItem(STORE_INFO_CACHE_KEY, JSON.stringify(cache)); } catch (err) {}
      return sorted.length > before ? sorted.filter(month => !live.storeInfoByMonth[month]) : [];
    }
    function saveStoreInfoCache(month, info){
      const normalized = normalizeMonth(month);
      if (!normalized || !info) return;
      let cache = {};
      try { cache = JSON.parse(localStorage.getItem(STORE_INFO_CACHE_KEY) || "{}") || {}; } catch (err) { cache = {}; }
      if (!cache.months || typeof cache.months !== "object") cache.months = {};
      cache.months[normalized] = Object.assign({}, info, {_month:normalized, _cachedAt:Date.now()});
      const apiMonths = [
        normalized,
        ...(Array.isArray(info.months) ? info.months : []),
        ...(Array.isArray(info.monthTotals) ? info.monthTotals.map(x => x.key || x.month) : [])
      ].map(normalizeMonth).filter(Boolean);
      cache.knownMonths = Array.from(new Set([...(Array.isArray(cache.knownMonths) ? cache.knownMonths : []), ...apiMonths])).sort(monthCompare);
      live.storeInfoKnownMonths = cache.knownMonths;
      const monthKeys = Object.keys(cache.months).filter(key => /^\d{2}\/\d{4}$/.test(normalizeMonth(key))).sort(monthCompare);
      while (monthKeys.length > 18) delete cache.months[monthKeys.shift()];
      cache.updatedAt = new Date().toISOString();
      try { localStorage.setItem(STORE_INFO_CACHE_KEY, JSON.stringify(cache)); } catch (err) {}
    }

      if (!String(item.tenSanPham || "").trim()) return `${label}: thiếu tên sản phẩm.`;
      if (!String(item.soLuong || "").trim() || Number(item.soLuong) <= 0) return `${label}: thiếu số lượng hợp lệ.`;
      if (!String(item.tinhTrang || "").trim()) return `${label}: thiếu tình trạng.`;
      if (!Array.isArray(item.images) || !item.images.length) return `${label}: thiếu ảnh sản phẩm.`;
      return "";
    }
    function returnThItemsForSave(){
      const items = (returnThState.items || []).slice();
      const draft = returnThDraftItem();
      if (returnThDraftHasValue() || !items.length) items.push(draft);
      return items;
    }
    function addReturnThItem(){
      const draft = returnThDraftItem();
      const err = validateReturnThItem(draft, `SKU ${(returnThState.items || []).length + 1}`);
      if (err) return toast(err, "err");
      returnThState.items.push(draft);
      returnThState.product = "";
      returnThState.productSearch = "";
      returnThState.customProduct = false;
      returnThState.newSubSku = "";
      returnThState.newName = "";
      returnThState.newUnit = "";
      returnThState.qty = "";
      returnThState.status = "Bình thường";
      returnThState.note = "";
      live.returnThFiles = [];
      returnth();
    }
    function removeReturnThItem(index){
      returnThState.items.splice(index, 1);
      returnth();
    }
    function returnThAddedList(){
      const items = returnThState.items || [];
      if (!items.length) return "";
      return `<div class="sku-added-list">${items.map((item, index) => `
        <div class="sku-added-item">
          <div><strong>${html(item.tenSanPham || "-")}</strong><span>${html(item.tinhTrang || "-")} · SL ${html(item.soLuong || "-")} · ${Number((item.images || []).length || 0)} ảnh${item.ghiChu ? " · " + html(item.ghiChu) : ""}</span></div>
          <button type="button" onclick="removeReturnThItem(${index})">Xóa</button>
        </div>`).join("")}</div>`;
    }
    async function createReturnThSku(){
      if (returnThState.creatingSku) return;
      const subSku = String(returnThState.newSubSku || "").trim();
      const name = String(returnThState.newName || "").trim();
      const unit = String(returnThState.newUnit || "").trim();
      if (!subSku || !name || !unit) return toast("Nhập đủ SUB SKU, Tên SKU và Đơn vị.", "err");
      returnThState.creatingSku = true;
      returnth();
      const res = await returnThApi("createSku", {subSku, name, unit, _silent:true});
      returnThState.creatingSku = false;
      if (!res.ok) {
        returnth();
        return toast(res.message || "Chưa tạo được SKU mới.", "err");
      }
      const item = res.item || {subSku, name, unit};
      returnThProducts.push(item);
      saveReturnThSkuCache(returnThProducts);
      returnThState.product = name;
      returnThState.productSearch = name;
      returnThState.customProduct = false;
      returnThState.newSubSku = "";
      returnThState.newName = "";
      returnThState.newUnit = "";
      returnth();
      toast("Đã thêm SKU mới vào Thông tin SKU.", "ok");
    }
    function returnth(){
      el("view").className = "content";
      if (!returnThState.skuLoaded && !returnThState.loadingSku) setTimeout(() => loadReturnThSku(false), 0);
      el("view").innerHTML = `<section class="section form-sheet">
        <div class="form-head"><h2>Nhập TH</h2>${returnThState.loadingSku ? `<span class="muted">Đang tải SKU...</span>` : ""}</div>
        <div class="grid">
          <label>Mã đơn<div class="scan-row"><input id="returnThMaDon" placeholder="Scan hoặc nhập mã đơn" value="${html(returnThState.maDon)}" oninput="returnThState.maDon=this.value"><button class="scan-btn" type="button" title="Quét mã đơn" aria-label="Quét mã đơn" onclick="openCodeScanner('returnThMaDon', 'setReturnThMaDon')">${scanIcon("Quét mã đơn")}</button></div></label>
          <label>Tên sản phẩm${skuComboHtml("returnth")}</label>
        </div>
        ${returnThState.customProduct ? `<div class="grid cols-3">
          <label>SUB SKU<input value="${html(returnThState.newSubSku)}" placeholder="Nhập SUB SKU" oninput="returnThState.newSubSku=this.value"></label>
          <label>Tên SKU<input value="${html(returnThState.newName)}" placeholder="Nhập tên SKU" oninput="returnThState.newName=this.value"></label>
          <label>Đơn vị<input value="${html(returnThState.newUnit)}" placeholder="Nhập đơn vị" oninput="returnThState.newUnit=this.value"></label>
        </div><div style="display:flex;justify-content:flex-end"><button type="button" class="primary" onclick="createReturnThSku()" ${returnThState.creatingSku?"disabled":""}>${returnThState.creatingSku?"Đang tạo...":"Lưu SKU mới"}</button></div>` : ""}
        <div class="grid cols-2">
          <label>Số lượng<input type="number" min="1" inputmode="numeric" placeholder="Nhập số lượng" value="${html(returnThState.qty)}" oninput="returnThState.qty=this.value"></label>
          <label>Tình trạng<select onchange="returnThState.status=this.value"><option ${returnThState.status==="Bình thường"?"selected":""}>Bình thường</option><option ${returnThState.status==="Móp_lỗi hỏng sản phẩm"?"selected":""}>Móp_lỗi hỏng sản phẩm</option></select></label>
        </div>
        <label>Ghi chú<textarea placeholder="Ghi chú nếu có" oninput="returnThState.note=this.value">${html(returnThState.note)}</textarea></label>
        <h2 style="margin-top:16px">Ảnh SKU này</h2>
        <div class="file-actions"><button type="button" onclick="openFilePicker('returnThCamera')">Chụp ảnh</button><button type="button" onclick="openFilePicker('returnThLibrary')">Chọn từ thư viện</button></div>
        <input id="returnThCamera" class="hidden-file" type="file" accept="image/*" capture="environment" onchange="captureFiles(this, 'returnThFiles', 'returnThPreview')">
        <input id="returnThLibrary" class="hidden-file" type="file" accept="image/*" onchange="captureFiles(this, 'returnThFiles', 'returnThPreview')">
        <div id="returnThPreview" class="preview-grid"></div>
        <div style="display:flex;justify-content:flex-end"><button type="button" onclick="addReturnThItem()">Thêm SKU</button></div>
        ${returnThAddedList()}
        <div style="margin-top:14px;display:flex;gap:10px;justify-content:flex-end"><button type="button" onclick="resetReturnThForm(); returnth()">Hủy</button><button type="button" class="success" onclick="saveReturnTh()" ${returnThState.saving ? "disabled" : ""}>OK</button></div>
      </section>`;
      renderFilePreview("returnThFiles", "returnThPreview", "returnThCamera");
    }
    async function saveReturnTh(){
      if (returnThState.saving) return;
      const maDon = String(returnThState.maDon || "").trim();
      const items = returnThItemsForSave();
      if (!maDon) return toast("Vui lòng nhập mã đơn.", "err");
      for (let i = 0; i < items.length; i++) {
        const err = validateReturnThItem(items[i], `SKU ${i + 1}`);
        if (err) return toast(err, "err");
      }
      returnThState.saving = true;
      try {
        await enqueueReturnThSave({
          maDon,
          tenSanPham: items[0].tenSanPham,
          soLuong: items[0].soLuong,
          tinhTrang: items[0].tinhTrang,
          ghiChu: items[0].ghiChu || "",
          items
        });
        resetReturnThForm();
        returnth();
      } catch (err) {
        toast(err && err.message ? err.message : String(err), "err");
      } finally {
        returnThState.saving = false;
      }
    }
    function captureFiles(input, bucket, targetId){
      live[bucket] = Array.from(input.files || []);
      renderFilePreview(bucket, targetId, input.id);
    }
    async function uploadSelectedImages(rawId, maDon){
      const files = [...live.docFiles, ...live.productFiles].slice(0, 8);
      if (!files.length) return;
      const payload = [];
      for (const file of files) {
        payload.push(await filePayload(file, {imageType:"document"}));
      }
      const res = await api("uploadImages", {rawId, maDon, files: payload});
      if (!res.ok) toast(res.message || "Upload ảnh lỗi", "err");
    }
    function imageByteLimit(meta = {}){
      return meta.imageType === "product" ? 500 * 1024 : 300 * 1024;
    }
    function base64ByteSize(base64){
      const text = String(base64 || "").replace(/\s/g, "");
      return Math.ceil(text.length * 3 / 4);
    }
    function dataUrlFromBase64(base64, mimeType){
      const raw = String(base64 || "");
      return raw.startsWith("data:") ? raw : `data:${mimeType || "image/jpeg"};base64,${raw}`;
    }
    function splitDataUrl(dataUrl){
      const text = String(dataUrl || "");
      const match = text.match(/^data:([^;]+);base64,(.*)$/);
      return match ? {mimeType: match[1] || "image/jpeg", base64: match[2] || ""} : {mimeType:"image/jpeg", base64:text};
    }
    function readFileAsDataUrl(file){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Không đọc được ảnh từ thiết bị. Vui lòng chụp/chọn lại ảnh."));
        reader.readAsDataURL(file);
      });
    }
    function compressImageDataUrl(dataUrl, maxBytes){
      return new Promise(resolve => {
        const original = splitDataUrl(dataUrl);
        if (!original.base64 || base64ByteSize(original.base64) <= maxBytes) {
          resolve({dataUrl, mimeType: original.mimeType, base64: original.base64});
          return;
        }
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement("canvas");
          let scale = 1;
          let quality = 0.88;
          let best = dataUrl;
          const minLongSide = 1400;
          const maxSide = Math.max(img.width, img.height) || 1;
          const minScale = Math.min(1, minLongSide / maxSide);
          for (let i = 0; i < 12; i++) {
            canvas.width = Math.max(1, Math.round(img.width * scale));
            canvas.height = Math.max(1, Math.round(img.height * scale));
            const ctx = canvas.getContext("2d");
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            best = canvas.toDataURL("image/jpeg", quality);
            const body = splitDataUrl(best).base64;
            if (base64ByteSize(body) <= maxBytes || (quality <= 0.58 && scale <= minScale)) break;
            if (quality > 0.62) quality -= 0.08;
            else scale = Math.max(minScale, scale * 0.86);
          }
          const out = splitDataUrl(best);
          resolve({dataUrl: best, mimeType: "image/jpeg", base64: out.base64});
        };
        img.onerror = () => resolve({dataUrl, mimeType: original.mimeType, base64: original.base64});
        img.src = dataUrl;
      });
    }
    async function normalizeImagePayload(dataUrl, fileName, mimeType, meta = {}){
      const normalized = await compressImageDataUrl(dataUrl, imageByteLimit(meta));
      const base64 = normalized.base64 || "";
      if (!base64) throw new Error("Không đọc được dữ liệu ảnh. Vui lòng chụp/chọn lại ảnh.");
      return {
        fileName: fileName || ("VTD_" + Date.now() + ".jpg"),
        mimeType: normalized.mimeType || mimeType || "image/jpeg",
        base64,
        data: base64
      };
    }
    async function filePayload(file, meta = {}){
      if (!file) throw new Error("Không nhận được file ảnh từ thiết bị.");
      if (file.nativeImage || file.base64 || file.data) {
        const mimeType = file.mimeType || file.type || "image/jpeg";
        const dataUrl = dataUrlFromBase64(file.base64 || file.data || "", mimeType);
        return normalizeImagePayload(dataUrl, file.fileName || file.name || ("VTD_" + Date.now() + ".jpg"), mimeType, meta);
      }
      const dataUrl = await readFileAsDataUrl(file);
      return normalizeImagePayload(dataUrl, file.name || ("VTD_" + Date.now() + ".jpg"), file.type || "image/jpeg", meta);
    }
    async function store(){
      el("view").className = "content";
      const monthOptions = liveMonthOptions();
      if (!monthOptions.includes(storeMonth)) storeMonth = defaultStoreMonth(monthOptions);
      const cachedInfo = live.storeInfoByMonth[storeMonth];
      const needsLive = shouldLiveLoadStore(storeMonth) && !cachedInfo;
      if (!cachedInfo && !live.storeLocalLoading[storeMonth]) {
        const requestedMonth = storeMonth;
        live.storeLocalLoading[requestedMonth] = true;
        loadStoreInfoFromDevice(requestedMonth).then(async found => {
          delete live.storeLocalLoading[requestedMonth];
          if (!found && !live.storeLoading) await loadStoreInfo(requestedMonth);
          if (view === "store") store();
        });
      } else if (cachedInfo && shouldLiveLoadStore(storeMonth) && !live.storeLoading) {
        loadStoreInfo(storeMonth);
      }
      const info = cachedInfo || (live.storeInfoMonth === storeMonth ? live.storeInfo : null);
      const apiRows = info && (info.byStore || info.byDate);
      let fullData = Array.isArray(apiRows) ? apiRows.map(x => [x.key, x.value]) : (storeByMonth[storeMonth] || []);
      if (!fullData.length) {
        const fixedTotal = fixedMonthTotals()[storeMonth] || 0;
        if (fixedTotal) fullData = [["Tổng tháng đã chốt", fixedTotal]];
      }
      const data = storeType === "Tất cả" ? fullData : fullData.filter(x => x[0] === storeType);
      const total = data.reduce((s, x) => s + Number(x[1] || 0), 0) || 1;
      const max = Math.max(...data.map(x => Number(x[1] || 0)), 1);
      const bars = data.length ? data.map(x => `<tr><td>${html(x[0])}</td><td><strong>${Number(x[1]).toLocaleString("vi-VN")}</strong></td><td><div style="height:18px;background:#e8f1ff;border-radius:999px;overflow:hidden"><div style="height:100%;width:${Math.round(Number(x[1])/max*100)}%;background:#12b8a6"></div></div></td><td>${Math.round(Number(x[1])/total*100)}%</td></tr>`).join("") : `<tr><td colspan="4">Không có dữ liệu cho bộ lọc này.</td></tr>`;
      el("view").innerHTML = `<section class="section"><h2>Thông tin ST</h2><div class="search-filter-row"><label>Tháng<select onchange="storeMonth=this.value; store()">${monthOptions.map(m => `<option ${m===storeMonth?"selected":""}>${m}</option>`).join("")}</select></label><label>Loại ST<select onchange="storeType=this.value; store()">${allStoreTypes().map(x => `<option ${x===storeType?"selected":""}>${html(x)}</option>`).join("")}</select></label></div></section>
      <section class="section"><h2>Thông tin tổng hợp theo tháng</h2>${monthlySummaryChart()}</section>
      <section class="section"><h2>Số lượng đơn theo loại siêu thị</h2>${renderStoreChart(data, (appConfig.storeCharts || {}).storeType || "table", false)}</section>
      <section class="section"><h2>Dữ liệu đơn theo ngày ${html(storeMonth)}</h2>${storeDayDetails()}</section>`;
    }
    function logout(){
      clearLoading();
      localStorage.removeItem("vtd_session_day");
      localStorage.removeItem("vtd_token");
      localStorage.removeItem("vtd_user");
      live.token = "";
      live.user = null;
      clearLoading();
      showLogin();
    }
    (function bootLive(){
      clearLoading();
      bindLoginEnter();
      lockPortrait();
      initAppHistory();
      const storedUser = localStorage.getItem("vtd_user");
      if (storedUser) live.user = JSON.parse(storedUser);
      if (sessionValid() && live.token) showApp(); else showLogin();
    })();
    window.addEventListener("pageshow", clearLoading);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) clearLoading();
    });
  </script>
